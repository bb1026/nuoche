name: Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g wrangler
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          wrangler deploy
      - name: Set env vars
        run: |
          wrangler secret put WX_TOKEN_ENV <<EOF
          ${{ secrets.WX_TOKEN }}
          EOF
          wrangler secret put WX_UID_ENV <<EOF
          ${{ secrets.WX_UID }}
          EOF