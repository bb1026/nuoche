name: Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@4
      - run: npm install -g wrangler
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy
      - name: Set secrets
        run: |
          wrangler secret put PHONE_ENV <<EOF
          ${{ secrets.PHONE }}
          EOF
          wrangler secret put WX_TOKEN_ENV <<EOF
          ${{ secrets.WX_TOKEN }}
          EOF
          wrangler secret put WX_UID_ENV <<EOF
          ${{ secrets.WX_UID }}
          EOF