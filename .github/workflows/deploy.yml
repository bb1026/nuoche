name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # 如果要指定版本，写成下面这样的合法 semver
          wranglerVersion: "3.x"
          command: deploy
          secrets: |
            PHONE_ENV
            WX_TOKEN_ENV
            WX_UID_ENV
        env:
          PHONE_ENV: ${{ secrets.PHONE_ENV }}
          WX_TOKEN_ENV: ${{ secrets.WX_TOKEN_ENV }}
          WX_UID_ENV: ${{ secrets.WX_UID_ENV }}